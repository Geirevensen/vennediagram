<!doctype html>
<html lang="no">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Omgangskrets-kart</title>
  <style>
    :root{
      --bg:#0b0f14;
      --panel:#101826;
      --panel2:#0f1723;
      --text:#e7eef9;
      --muted:#9bb0c9;
      --stroke:#2b3a52;
      --shadow: 0 10px 30px rgba(0,0,0,.45);
      --cardW: 92px;
      --cardH: 118px;
      --avatarH: 72px;
      --radius: 14px;
      --enclosureStroke: 6px;
      --enclosureFill: rgba(255,255,255,0.03);
    }
    html,body{height:100%; margin:0; background:var(--bg); color:var(--text); font-family: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial;}
    #wrap{position:fixed; inset:0; display:grid; grid-template-rows:auto 1fr;}
    header{
      display:flex; gap:12px; align-items:center;
      padding:12px 14px; border-bottom:1px solid rgba(255,255,255,.06);
      background:linear-gradient(to bottom, rgba(16,24,38,.9), rgba(16,24,38,.55));
      backdrop-filter: blur(8px);
    }
    header .title{font-weight:700; letter-spacing:.2px;}
    header input{
      flex:1;
      max-width: 520px;
      padding:10px 12px;
      border-radius: 12px;
      border:1px solid rgba(255,255,255,.08);
      background: rgba(255,255,255,.04);
      color:var(--text);
      outline:none;
    }
    header .hint{color:var(--muted); font-size:13px;}
    #stage{position:relative; overflow:hidden;}
    svg{width:100%; height:100%;}
    .link{stroke:rgba(200,220,255,.25); stroke-width:2; vector-effect: non-scaling-stroke;}
    .link.gift_med{stroke-width:3.5;}
    .link.eks_med{stroke-dasharray:5 4;}
    .link.forskerkollega_med{stroke-dasharray:2 6;}
    .link.bruk{stroke:rgba(200,220,255,.25);}
    .enclosure{fill:var(--enclosureFill); stroke:rgba(140,170,210,.35); stroke-width: var(--enclosureStroke); }
    .encl-label{fill:rgba(230,245,255,.85); font-size:12px; letter-spacing:.2px;}
    .node{cursor:pointer;}
    .card{
      width: var(--cardW);
      height: var(--cardH);
      border-radius: var(--radius);
      overflow:hidden;
      box-shadow: var(--shadow);
      border:1px solid rgba(255,255,255,.10);
      background: rgba(255,255,255,.05);
    }
    .avatar{
      height: var(--avatarH);
      width:100%;
      display:flex;
      align-items:center;
      justify-content:center;
      background: rgba(255,255,255,.06);
      border-bottom: 1px solid rgba(255,255,255,.08);
    }
    .avatar .dummy{
      width:34px; height:34px;
      border-radius: 12px;
      border:1px dashed rgba(255,255,255,.25);
      display:flex; align-items:center; justify-content:center;
      color:rgba(255,255,255,.55);
      font-size:14px;
    }
    .name{
      padding:10px 10px 0 10px;
      font-size:13px;
      font-weight:700;
      line-height:1.05;
      color:rgba(240,248,255,.94);
    }
    .sub{
      padding:6px 10px 10px 10px;
      font-size:11.5px;
      color:rgba(155,176,201,.85);
      white-space:nowrap;
      overflow:hidden;
      text-overflow:ellipsis;
    }
    .badge{
      display:inline-block;
      padding:2px 8px;
      border-radius:999px;
      border:1px solid rgba(255,255,255,.10);
      background: rgba(255,255,255,.05);
      font-size:11px;
      margin-top:6px;
      color:rgba(230,245,255,.85);
    }
    .ring{
      fill:none;
      stroke: rgba(255,255,255,.28);
      stroke-width:3;
      filter: drop-shadow(0 10px 18px rgba(0,0,0,.6));
    }
    /* overlay */
    #overlay{
      position:fixed; inset:0;
      display:none;
      align-items:center; justify-content:center;
      background: rgba(0,0,0,.55);
      backdrop-filter: blur(6px);
      z-index:10;
      padding: 18px;
    }
    #overlay .modal{
      width:min(680px, 95vw);
      border-radius: 18px;
      background: rgba(16,24,38,.92);
      border:1px solid rgba(255,255,255,.12);
      box-shadow: var(--shadow);
      overflow:hidden;
    }
    #overlay .modal header{
      border-bottom:1px solid rgba(255,255,255,.08);
      background: rgba(255,255,255,.03);
      padding:14px 16px;
      display:flex;
      justify-content:space-between;
      align-items:center;
    }
    #overlay .modal header .h{
      display:flex; flex-direction:column; gap:2px;
    }
    #overlay .modal header .h .full{font-weight:800;}
    #overlay .modal header .h .tags{color:var(--muted); font-size:12.5px;}
    #overlay button{
      cursor:pointer;
      border-radius: 12px;
      border:1px solid rgba(255,255,255,.16);
      background: rgba(255,255,255,.05);
      color: var(--text);
      padding: 8px 10px;
    }
    #overlay .body{
      padding: 14px 16px 16px 16px;
      color: rgba(230,245,255,.92);
      line-height:1.4;
      min-height: 90px;
    }
    #overlay .body .empty{color: rgba(155,176,201,.85);}
  </style>
</head>
<body>
<div id="wrap">
  <header>
    <div class="title">Omgangskrets-kart</div>
    <input id="search" type="search" placeholder="Søk etter navn..." />
    <div class="hint">Tips: klikk på en person for detaljer. Dra for å flytte.</div>
  </header>
  <div id="stage">
    <svg id="svg"></svg>
  </div>
</div>

<div id="overlay" role="dialog" aria-modal="true">
  <div class="modal">
    <header>
      <div class="h">
        <div class="full" id="ovName">Navn</div>
        <div class="tags" id="ovTags"></div>
      </div>
      <button id="ovClose" title="Lukk">Lukk</button>
    </header>
    <div class="body" id="ovBio"></div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/d3@7/dist/d3.min.js"></script>
<script>
(async function(){
  const data = await fetch("./vennedata_network_v2.json").then(r => r.json());

  // --- config
  const svg = d3.select("#svg");
  const stage = document.getElementById("stage");
  const width = () => stage.clientWidth;
  const height = () => stage.clientHeight;

  const enclosureColors = new Map();
  const palette = [
    "rgba(160,190,220,.25)","rgba(195,170,215,.25)","rgba(170,210,190,.25)",
    "rgba(220,190,160,.25)","rgba(190,220,160,.25)","rgba(210,170,170,.25)",
    "rgba(170,180,225,.25)","rgba(205,205,170,.25)","rgba(180,210,225,.25)"
  ];
  data.enclosures.forEach((e,i)=> enclosureColors.set(e.id, palette[i % palette.length]));

  // helpers
  const peopleById = new Map(data.people.map(p => [p.id, p]));
  const links = data.relations
    // Unngå å tegne "venn_med" hvis du senere legger inn slike internt i innhegningene
    .map(r => ({...r, source: peopleById.get(r.source), target: peopleById.get(r.target)}))
    .filter(l => l.source && l.target);

  // Nodes: shallow copy so D3 can mutate x/y/vx/vy
  const nodes = data.people.map(p => ({...p}));

  // Pick "me" if marked; else none.
  const me = nodes.find(n => n.roles && n.roles.is_me);

  // --- layout: force graph with gentle clustering by enclosure tags
  // Precompute group centroids (moving targets)
  const groupIds = data.enclosures.map(e => e.id).filter(id => id !== "ingen");

  function groupForce(strength = 0.05){
    return (alpha) => {
      // moving anchor points on a ring, so groups spread out but overlap still possible
      const W = width(), H = height();
      const cx = W/2, cy = H/2;
      const radius = Math.min(W,H) * 0.24;

      const anchors = new Map();
      groupIds.forEach((gid, i) => {
        const a = (i / groupIds.length) * Math.PI * 2;
        anchors.set(gid, {x: cx + Math.cos(a) * radius, y: cy + Math.sin(a) * radius});
      });

      nodes.forEach(n => {
        if (!n.groups || n.groups.length === 0) return;
        // Average of anchors for groups -> supports overlap naturally
        const pts = n.groups
          .filter(g => anchors.has(g))
          .map(g => anchors.get(g));
        if (!pts.length) return;
        const ax = d3.mean(pts, p => p.x);
        const ay = d3.mean(pts, p => p.y);
        n.vx += (ax - n.x) * strength * alpha;
        n.vy += (ay - n.y) * strength * alpha;
        // Gateway nodes get a slightly stronger pull toward their group anchors
        if (n.roles && n.roles.is_gateway) {
          n.vx += (ax - n.x) * strength * 0.75 * alpha;
          n.vy += (ay - n.y) * strength * 0.75 * alpha;
        }
      });
    };
  }

  const sim = d3.forceSimulation(nodes)
    .force("link", d3.forceLink(links).id(d => d.id).distance(110).strength(0.22))
    .force("charge", d3.forceManyBody().strength(-380))
    .force("collide", d3.forceCollide(64))
    .force("center", d3.forceCenter(width()/2, height()/2))
    .force("group", groupForce(0.06));

  // If "me" exists, keep near center
  if (me){
    sim.force("x", d3.forceX(width()/2).strength(d => (d.id===me.id ? 0.35 : 0.03)));
    sim.force("y", d3.forceY(height()/2).strength(d => (d.id===me.id ? 0.35 : 0.03)));
  }

  // --- draw enclosures as soft hulls (simple convex hull). For v0, this works well.
  const gEnclosures = svg.append("g").attr("class","enclosures");
  const gLinks = svg.append("g").attr("class","links");
  const gNodes = svg.append("g").attr("class","nodes");

  const linkSel = gLinks.selectAll("line")
    .data(links)
    .enter()
    .append("line")
    .attr("class", d => `link ${d.type || ""}`);

  // Node: foreignObject for HTML cards
  const nodeSel = gNodes.selectAll("g.node")
    .data(nodes)
    .enter()
    .append("g")
    .attr("class","node")
    .call(d3.drag()
      .on("start", (event, d) => { if (!event.active) sim.alphaTarget(0.2).restart(); d.fx=d.x; d.fy=d.y; })
      .on("drag", (event, d) => { d.fx=event.x; d.fy=event.y; })
      .on("end", (event, d) => { if (!event.active) sim.alphaTarget(0); d.fx=null; d.fy=null; })
    )
    .on("click", (_, d) => openOverlay(d));

  nodeSel.append("circle")
    .attr("r", 0)
    .attr("class","ring");

  const fo = nodeSel.append("foreignObject")
    .attr("width", 92)
    .attr("height", 118)
    .attr("x", -46)
    .attr("y", -59);

  const card = fo.append("xhtml:div").attr("class","card");
  const avatar = card.append("div").attr("class","avatar");
  avatar.append("div").attr("class","dummy").text("◻︎");

  card.append("div").attr("class","name").text(d => d.display_name || d.first_name || d.name || ("ID " + d.id));
  card.append("div").attr("class","sub").text(d => (d.group_labels && d.group_labels[0]) ? d.group_labels[0] : "");

  // Highlight ring for "me" and gateway nodes
  nodeSel.filter(d => d.roles && d.roles.is_me)
    .append("circle")
    .attr("class","ring")
    .attr("r", 66)
    .attr("stroke", "rgba(255,255,255,.32)");

  nodeSel.filter(d => d.roles && d.roles.is_gateway && !d.roles.is_me)
    .append("circle")
    .attr("class","ring")
    .attr("r", 62)
    .attr("stroke", "rgba(255,255,255,.18)");

  // Overlay logic
  const overlay = document.getElementById("overlay");
  const ovName = document.getElementById("ovName");
  const ovTags = document.getElementById("ovTags");
  const ovBio  = document.getElementById("ovBio");
  document.getElementById("ovClose").addEventListener("click", closeOverlay);
  overlay.addEventListener("click", (e)=> { if (e.target === overlay) closeOverlay(); });

  function openOverlay(d){
    ovName.textContent = d.name || (d.first_name + " " + d.last_name);
    const tags = (d.group_labels && d.group_labels.length) ? d.group_labels.join(" · ") : "Ingen gruppe";
    const extra = (d.roles && d.roles.is_gateway) ? " · inngangsperson" : "";
    ovTags.textContent = tags + extra;
    if (d.bio && d.bio.trim().length){
      ovBio.textContent = d.bio.trim();
    } else {
      ovBio.innerHTML = '<span class="empty">Ingen biografi ennå. (Du kan fylle inn senere i JSON-filen.)</span>';
    }
    overlay.style.display="flex";
  }
  function closeOverlay(){ overlay.style.display="none"; }

  // Search
  const search = document.getElementById("search");
  search.addEventListener("input", () => {
    const q = search.value.trim().toLowerCase();
    nodeSel.style("opacity", d => {
      if (!q) return 1;
      const hay = (d.name + " " + (d.display_name||"")).toLowerCase();
      return hay.includes(q) ? 1 : 0.15;
    });
    linkSel.style("opacity", l => {
      if (!q) return 1;
      const hs = (l.source.name||"").toLowerCase();
      const ht = (l.target.name||"").toLowerCase();
      return (hs.includes(q) || ht.includes(q)) ? 1 : 0.05;
    });
  });

  // Convex hull helpers for enclosures (simple)
  function hullPath(points, padding=32){
    if (points.length < 3) return null;
    const hull = d3.polygonHull(points);
    if (!hull) return null;
    // Expand hull by padding (approx by moving points away from centroid)
    const cx = d3.mean(hull, p => p[0]);
    const cy = d3.mean(hull, p => p[1]);
    const expanded = hull.map(([x,y]) => {
      const dx = x - cx, dy = y - cy;
      const len = Math.hypot(dx,dy) || 1;
      return [x + (dx/len)*padding, y + (dy/len)*padding];
    });
    return "M" + expanded.map(p => p.join(",")).join("L") + "Z";
  }

  // enclosure shapes + labels (created once; updated each tick)
  const enclData = data.enclosures.filter(e => e.id !== "ingen" && e.members && e.members.length >= 3);
  const enclSel = gEnclosures.selectAll("path.enclosure")
    .data(enclData)
    .enter()
    .append("path")
    .attr("class","enclosure")
    .attr("stroke", e => enclosureColors.get(e.id) || "rgba(160,190,220,.25)");

  const enclLabels = gEnclosures.selectAll("text.encl-label")
    .data(enclData)
    .enter()
    .append("text")
    .attr("class","encl-label")
    .text(e => e.label);

  // resize
  const ro = new ResizeObserver(() => {
    sim.force("center", d3.forceCenter(width()/2, height()/2));
    sim.alpha(0.25).restart();
  });
  ro.observe(stage);

  sim.on("tick", () => {
    // links
    linkSel
      .attr("x1", d => d.source.x).attr("y1", d => d.source.y)
      .attr("x2", d => d.target.x).attr("y2", d => d.target.y);

    // nodes
    nodeSel.attr("transform", d => `translate(${d.x},${d.y})`);

    // enclosures hulls
    enclSel.attr("d", e => {
      const pts = e.members
        .map(id => nodes.find(n => n.id === id))
        .filter(Boolean)
        .map(n => [n.x, n.y]);
      return hullPath(pts, 40);
    });

    enclLabels
      .attr("x", e => {
        const pts = e.members.map(id => nodes.find(n => n.id===id)).filter(Boolean);
        return d3.mean(pts, n => n.x) || 0;
      })
      .attr("y", e => {
        const pts = e.members.map(id => nodes.find(n => n.id===id)).filter(Boolean);
        return (d3.min(pts, n => n.y) || 0) - 78;
      });
  });
})();
</script>
</body>
</html>
